# Netlify configuration for Sodiq Yusuff MMA
# Static site — no build step needed

[build]
  publish = "."
  command = ""

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirect clean URLs (optional — matches .html if not found)
[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/about-sodiq"
  to = "/about.html"
  status = 301

# Form handling fallback — if you use Netlify Forms instead of GoHighLevel,
# add `netlify` attribute to each <form> tag.
